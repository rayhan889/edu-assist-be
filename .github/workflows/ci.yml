name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        env:
          POSTGRES_URL: postgresql://dummy:dummy@localhost:5432/dummy
          GOOGLE_CLIENT_ID: dummy_client_id
          GOOGLE_CLIENT_SECRET: dummy_client_secret
          JWT_SECRET: dummy_jwt_secret
        run: pnpm test
